backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "cafes"
    label: "Cafés"
    label_singular: "Café"
    identifier_field: "name"
    folder: "data"
    path: "cafes"
    extension: "json"
    format: "json"
    create: false
    files:
      - file: "data/cafes.json"
        label: "Cafés list"
        name: "cafes_list"
        format: "json"
        fields:
          - label: "Cafés"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.hood}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Neighborhood", name: "hood", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Latitude", name: "lat", widget: "number", value_type: "float", step: 0.0001 }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float", step: 0.0001 }
              - { label: "Price", name: "price", widget: "select", options: ["$", "$$", "$$$"] }
              - { label: "Coffee rating", name: "coffee", widget: "number", min: 1, max: 5, step: 1 }
              - { label: "Vibe rating", name: "vibe", widget: "number", min: 1, max: 5, step: 1 }
              - { label: "Value rating", name: "value", widget: "number", min: 1, max: 5, step: 1 }
              - { label: "Review", name: "review", widget: "text" }
              - { label: "Drinks you tried", name: "drinks", widget: "list", field: { label: "Drink", name: "drink", widget: "string" } }
              - { label: "Roaster", name: "roaster", widget: "string" }
              - { label: "Bean ID", name: "beanId", widget: "string", required: false }

  - name: "beans"
    label: "Beans"
    label_singular: "Bean"
    identifier_field: "name"
    files:
      - file: "data/beans.json"
        label: "Beans list"
        name: "beans_list"
        format: "json"
        fields:
          - label: "Beans"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.roaster}}"
            fields:
              - { label: "Bean ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Roaster", name: "roaster", widget: "string" }
              - { label: "Roast", name: "roast", widget: "select", options: ["Light", "Light-medium", "Medium", "Medium-dark", "Dark"] }
              - { label: "Acidity", name: "acidity", widget: "number", min: 1, max: 5, step: 1 }
              - { label: "Body", name: "body", widget: "number", min: 1, max: 5, step: 1 }
              - { label: "Tasting notes", name: "notes", widget: "list", field: { label: "Note", name: "note", widget: "string" } }
              - { label: "Origin", name: "origin", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Buy URL", name: "url", widget: "string" }
